{% extends "base.html" %}

{% block title %}
Contact | SnapQR
{% endblock %}

{% block content %}

<section class="max-w-6xl mx-auto px-6 py-20">

    <div class="text-center">

        <h1 class="text-5xl font-bold text-slate-800">
            Contact Us
        </h1>

        <p class="mt-6 text-xl text-gray-500">
            Have questions or suggestions? We'd love to hear from you.
        </p>

    </div>

</section>

<section class="max-w-4xl mx-auto px-6 pb-20">

    <div class="bg-white rounded-3xl shadow-xl p-10">

        <form id="contact-form">

            <div class="grid md:grid-cols-2 gap-6">

                <div>

                    <label class="font-semibold">
                        Name
                    </label>

                    <input type="text" id="name" name="name" class="w-full mt-2 border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">

                </div>

                <div>

                    <label class="font-semibold">
                        Email
                    </label>

                    <input type="email" id="email" name="email" class="w-full mt-2 border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">

                </div>

            </div>

            <div class="mt-6">

                <label class="font-semibold">
                    Subject
                </label>

                <input type="text" id="subject" name="subject" class="w-full mt-2 border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">

            </div>

            <div class="mt-6">

                <label class="font-semibold">
                    Message
                </label>

                <textarea id="message" name="message" class="w-full mt-2 border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition resize-none"></textarea>

            </div>

            <button id="send-btn" type="submit" class="mt-8 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl transition-all duration-300 hover:scale-105 active:scale-95">

                Send Message

            </button>

        </form>

    </div>

</section>
{% endblock %}
