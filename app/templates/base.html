<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}SnapQR{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-slate-100 font-[Inter]">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 shadow-sm">

    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

        <!-- Logo -->
        <a href="#" class="flex items-center gap-3">

            <div class="w-10 h-10 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-xl flex items-center justify-center text-white text-xl">
                📷
            </div>

            <div>
                <h1 class="text-2xl font-bold text-slate-800">
                    SnapQR
                </h1>

                <p class="text-xs text-slate-500">
                    Instant Image QR Generator
                </p>
            </div>

        </a>

        <!-- Navigation -->
        <div class="flex items-center gap-8">

            <a href="#"
               class="text-slate-600 hover:text-blue-600 transition font-medium">
                Home
            </a>

            <a href="#features"
               class="text-slate-600 hover:text-blue-600 transition font-medium">
                Features
            </a>

            <a href="#upload"
               class="text-slate-600 hover:text-blue-600 transition font-medium">
                Upload
            </a>

        </div>

    </div>

</nav>

    {% block content %}
    {% endblock %}

    <footer class="bg-white mt-20 shadow-inner">

        <div class="space-y-2">

            <p class="font-semibold text-slate-700">

                Made with ❤️ using Flask & Tailwind CSS

            </p>

            <p class="text-gray-500">

                © 2026 SnapQR

            </p>

        </div>

    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
